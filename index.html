<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PEI - EEM Dom Pedro II</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">

    <header class="bg-[#1f3864] text-white p-6 text-center shadow-lg">
        <h1 class="text-xl font-bold uppercase">Escola Estadual Militar Dom Pedro II</h1>
        <p class="text-xs mt-1">Plano Educacional Individualizado (PEI) - Victor Moises Haubricht</p>
    </header>

    <main class="container mx-auto p-4 max-w-6xl space-y-6">
        <section class="bg-white p-6 rounded-xl shadow-md border">
            <div class="flex flex-col md:flex-row justify-between gap-4 mb-6">
                <select id="materiaAtiva" onchange="carregarDados()" class="p-3 border rounded-lg font-bold text-blue-900 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 w-full md:w-80">
                    <optgroup label="I. LINGUAGENS">
                        <option value="LÍNGUA PORTUGUESA">LÍNGUA PORTUGUESA</option>
                        <option value="ARTE">ARTE</option>
                        <option value="EDUCAÇÃO FÍSICA">EDUCAÇÃO FÍSICA</option>
                        <option value="INGLÊS">INGLÊS</option>
                    </optgroup>
                    <optgroup label="II. MATEMÁTICA">
                        <option value="MATEMÁTICA">MATEMÁTICA</option>
                    </optgroup>
                    <optgroup label="III. CIÊNCIAS HUMANAS">
                        <option value="GEOGRAFIA">GEOGRAFIA</option>
                        <option value="HISTÓRIA">HISTÓRIA</option>
                    </optgroup>
                    <optgroup label="IV. CIÊNCIAS DA NATUREZA">
                        <option value="CIÊNCIAS">CIÊNCIAS</option>
                    </optgroup>
                </select>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="salvar()" class="flex-1 bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-emerald-700">SALVAR</button>
                    <button onclick="exportarPDF()" class="flex-1 bg-[#1f3864] text-white px-6 py-2 rounded-lg font-bold hover:bg-black">GERAR PDF FINAL</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="space-y-1"><label class="text-[10px] font-bold text-slate-500 uppercase">Unidades Temáticas</label><textarea id="u" class="w-full p-3 border rounded-lg h-28 text-sm outline-none"></textarea></div>
                <div class="space-y-1"><label class="text-[10px] font-bold text-slate-500 uppercase">Objetos de Conhecimento</label><textarea id="o" class="w-full p-3 border rounded-lg h-28 text-sm outline-none"></textarea></div>
                <div class="space-y-1"><label class="text-[10px] font-bold text-slate-500 uppercase">Habilidades Turma</label><textarea id="ht" class="w-full p-3 border rounded-lg h-28 text-sm outline-none"></textarea></div>
                <div class="space-y-1"><label class="text-[10px] font-bold text-blue-600 uppercase">Habilidades PAEDE</label><textarea id="hp" class="w-full p-3 border-2 border-blue-50 rounded-lg h-32 text-sm outline-none bg-blue-50/20"></textarea></div>
                <div class="space-y-1"><label class="text-[10px] font-bold text-slate-500 uppercase">Metodologia</label><textarea id="mt" class="w-full p-3 border rounded-lg h-32 text-sm outline-none"></textarea></div>
                <div class="space-y-1"><label class="text-[10px] font-bold text-slate-500 uppercase">Avaliação</label><textarea id="av" class="w-full p-3 border rounded-lg h-32 text-sm outline-none"></textarea></div>
            </div>
        </section>
        <section id="statusGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-2"></section>
    </main>

    <script>
        const areas = [
            { t: "I. ÁREA DE LINGUAGENS CÓDIGOS E SUAS TECNOLOGIAS", d: ["LÍNGUA PORTUGUESA", "ARTE", "EDUCAÇÃO FÍSICA", "INGLÊS"] },
            { t: "II. ÁREA DE MATEMÁTICA E SUAS TECNOLOGIAS", d: ["MATEMÁTICA"] },
            { t: "III. ÁREA DE CIÊNCIAS HUMANAS E SOCIAIS APLICADAS", d: ["GEOGRAFIA", "HISTÓRIA"] },
            { t: "IV. ÁREA CIÊNCIAS DA NATUREZA E SUAS TECNOLOGIAS", d: ["CIÊNCIAS"] }
        ];

        const dadosBase = {
            "LÍNGUA PORTUGUESA": { 
                u: "Aprendendo com os animais: fábulas; Narrativas de aventura; Modernismo; Gênero Lírico", 
                o: "Gênero Fábula; Substantivo; Artigo e Numeral; Adjetivos; Concordância Nominal", 
                ht: "(EF69LP47)(EF67LP27) (EF67LP28) (EF69LP53) (EF06LP04)", 
                hp: "(EF06LP12) (EF69LP47) (EF67LP27) (EF67LP28)", 
                mt: "Flexibilização de tempo; atendimento individualizado via material estruturado", 
                av: "Foco na funcionalidade da comunicação e no progresso individual conforme o PEI" 
            },
            "ARTE": { u: "DESENHO E PINTURA", o: "Desenho figurativo e abstrato; Elementos visuais", ht: "EF69AR01; EF69AR02", hp: "EF69AR01; EF69AR02", mt: "Atividades adaptadas", av: "Avaliação adaptada" }
        };

        function init() {
            for (let m in dadosBase) {
                if (!localStorage.getItem(`pei_v6_${m}`)) {
                    localStorage.setItem(`pei_v6_${m}`, JSON.stringify(dadosBase[m]));
                }
            }
            carregarDados();
        }

        function carregarDados() {
            const m = document.getElementById('materiaAtiva').value;
            const s = JSON.parse(localStorage.getItem(`pei_v6_${m}`)) || {u:'',o:'',ht:'',hp:'',mt:'',av:''};
            document.getElementById('u').value = s.u; document.getElementById('o').value = s.o;
            document.getElementById('ht').value = s.ht; document.getElementById('hp').value = s.hp;
            document.getElementById('mt').value = s.mt; document.getElementById('av').value = s.av;
            renderStatus();
        }

        function salvar() {
            const m = document.getElementById('materiaAtiva').value;
            const d = { u: document.getElementById('u').value, o: document.getElementById('o').value, ht: document.getElementById('ht').value, hp: document.getElementById('hp').value, mt: document.getElementById('mt').value, av: document.getElementById('av').value };
            localStorage.setItem(`pei_v6_${m}`, JSON.stringify(d));
            renderStatus();
            alert("Salvo!");
        }

        function renderStatus() {
            const g = document.getElementById('statusGrid'); g.innerHTML = '';
            areas.forEach(a => a.d.forEach(d => {
                const s = localStorage.getItem(`pei_v6_${d}`);
                g.innerHTML += `<div class="p-2 border rounded-lg text-center ${s?'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-white text-slate-300'}"><div class="text-[8px] font-bold truncate">${d}</div><div class="text-xs">${s?'✅':'⏳'}</div></div>`;
            }));
        }

        function carregarImagem(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = url;
            });
        }

        async function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const MARGIN = 15;
            const WIDTH = doc.internal.pageSize.getWidth() - (MARGIN * 2);
            
            let imgCabecalho;
            let alturaProporcional = 25; // Padrão caso falhe

            try {
                imgCabecalho = await carregarImagem('cabecalho.png');
                // Cálculo para manter a proporção original ocupando toda a largura
                const ratio = imgCabecalho.width / imgCabecalho.height;
                alturaProporcional = WIDTH / ratio;
            } catch (e) {
                console.error("Erro na imagem.");
            }

            const drawHeader = (pdf) => {
                if (imgCabecalho) {
                    // Adiciona imagem com largura total e altura calculada proporcionalmente
                    pdf.addImage(imgCabecalho, 'PNG', MARGIN, 8, WIDTH, alturaProporcional);
                }
                return 8 + alturaProporcional + 5; // Posição Y logo abaixo da imagem
            };

            let y = drawHeader(doc);
            doc.setFontSize(14).setFont(undefined, 'bold').text("PEI - VICTOR MOISES HAUBRICHT", 148, y, {align:'center'});
            y += 10;

            areas.forEach(area => {
                if (y > 175) { doc.addPage(); y = drawHeader(doc); }
                doc.setFillColor(31, 56, 100).rect(MARGIN, y, WIDTH, 8, 'F');
                doc.setTextColor(255).setFontSize(9).text(area.t, 148, y+5.5, {align:'center'});
                doc.setTextColor(0); y += 12;

                area.d.forEach(disc => {
                    const s = JSON.parse(localStorage.getItem(`pei_v6_${disc}`)) || {u:'-',o:'-',ht:'-',hp:'-',mt:'-',av:'-'};
                    doc.setFontSize(8).setFont(undefined, 'bold').text(disc + " / Assinatura: ________________________________________________", MARGIN, y);
                    
                    doc.autoTable({
                        startY: y + 2, margin: {left: MARGIN}, tableWidth: WIDTH,
                        head: [['UNIDADES', 'OBJETOS', 'HAB. TURMA', 'HAB. PAEDE', 'METODOLOGIA', 'AVALIAÇÃO']],
                        body: [[s.u, s.o, s.ht, s.hp, s.mt, s.av]],
                        theme: 'grid', styles: {fontSize: 7.5, cellPadding: 2},
                        headStyles: {fillColor: [230, 235, 245], textColor: 0},
                        didDrawPage: (data) => { if (data.pageNumber > 1 && data.cursor.y < 40) drawHeader(doc); }
                    });
                    y = doc.lastAutoTable.finalY + 12;
                    if (y > 185) { doc.addPage(); y = drawHeader(doc); }
                });
            });

            doc.save("PEI_VICTOR_MOISES_PROPORCIONAL.pdf");
        }

        init();
    </script>
</body>
</html>
